<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Vault</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #e0c3fc, #8ec5fc, #fbc2eb);
            background-size: 400% 400%;
            animation: bg 12s ease infinite;
            font-family: Arial, sans-serif;
        }

        @keyframes bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card-box {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
        }

        .btn-custom {
            width: 100%;
            margin-top: 10px;
            border-radius: 12px;
            padding: 10px;
            font-weight: 500;
        }

        h1 {
            font-weight: bold;
        }

        p {
            color: #333;
        }
    </style>

</head>

<body>

    <div class="card-box">

        <i class="bi bi-shield-lock-fill display-3 text-primary"></i>

        <h1 class="mt-3">Secure Vault</h1>

        <p>Store your passwords safely with encryption, JWT authentication, and SQLite database.</p>

        <a href="frontend/login.html" class="btn btn-primary btn-custom">
            Login
        </a>

        <a href="frontend/register.html" class="btn btn-success btn-custom">
            Create Account
        </a>

        <p class="mt-3 small text-muted">
            Built with Node.js + Express + SQLite + AES Encryption
        </p>

    </div>

</body>

</html>
