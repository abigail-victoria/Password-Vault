<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Vault</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            font-family: 'Poppins', sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background: linear-gradient(135deg, #ffd6e8, #e0c3fc, #c9e7ff, #d8f3dc);
            background-size:400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .glass{
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 28px;
            padding: 45px;
            text-align:center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            max-width: 500px;
            width: 100%;
        }

        .icon{
            font-size: 60px;
            color: #7c3aed;
        }

        h1{
            font-weight: 700;
            color:#374151;
        }

        p{
            color:#6b7280;
            margin-bottom:25px;
        }

        .btn-custom{
            width:100%;
            padding:12px;
            border-radius:16px;
            font-weight:500;
            border:none;
            margin-top:10px;
        }

        .btn-login{
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color:white;
        }

        .btn-register{
            background: linear-gradient(135deg, #22c55e, #06b6d4);
            color:white;
        }

        .footer{
            margin-top:20px;
            font-size:12px;
            color:#6b7280;
        }

    </style>

</head>

<body>

    <div class="glass">

        <div class="icon">
            <i class="bi bi-shield-lock-fill"></i>
        </div>

        <h1>Secure Vault</h1>

        <p>
            Your personal encrypted password manager with AES encryption,
            JWT authentication and SQLite storage.
        </p>

        <a href="frontend/login.html" class="btn btn-login btn-custom">
            <i class="bi bi-box-arrow-in-right"></i> Login
        </a>

        <a href="frontend/register.html" class="btn btn-register btn-custom">
            <i class="bi bi-person-plus"></i> Create Account
        </a>

        <div class="footer">
            Built with Node.js • Express • SQLite • AES Encryption
        </div>

    </div>

</body>

</html>
